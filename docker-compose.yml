# =============================================================================
# Obscura Trading Engine — Production Docker Compose
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: obscura-redis
    command: redis-server --save 300 1 --loglevel warning --maxmemory 450mb --maxmemory-policy allkeys-lru
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - trading_net

  questdb:
    image: questdb/questdb:latest
    container_name: obscura-db
    restart: always
    logging: *default-logging
    ports:
      - "9000:9000"
    environment:
      - QDB_CAIRO_MAX_UNCOMMITTED_ROWS=50000
      - QDB_LINE_TCP_NET_ACTIVE_CONNECTION_LIMIT=4
    volumes:
      - ./data/questdb:/var/lib/questdb
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/exec?query=SELECT%201 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - trading_net

  # ---------------------------------------------------------------------------
  # MICROSERVICES
  # ---------------------------------------------------------------------------
  rust-ingestor:
    build:
      context: ./services/ingestor
      dockerfile: Dockerfile
    container_name: obscura-ingestor
    restart: always
    logging: *default-logging
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy
      questdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - trading_net

  engine:
    build:
      context: ./services/engine-rust
      dockerfile: Dockerfile
    container_name: obscura-engine
    restart: always
    logging: *default-logging
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - trading_net

  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    container_name: obscura-agent
    restart: always
    logging: *default-logging
    ports:
      - "8001:8001"
    env_file: .env.production
    volumes:
      - ./data/sqlite:/app/data
      - ./data/screenshots:/app/screenshots
    depends_on:
      redis:
        condition: service_healthy
      engine:
        condition: service_started
    networks:
      - trading_net

  # ---------------------------------------------------------------------------
  # FRONTEND
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: obscura-ui
    restart: always
    logging: *default-logging
    ports:
      - "80:80"
    depends_on:
      - engine
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - trading_net

networks:
  trading_net:
    driver: bridge
