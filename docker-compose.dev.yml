version: '3.8'

# =============================================================================
# Obscura Trading Engine — Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================

services:
  redis:
    ports:
      - "6379:6379"   # Expose Redis for local debugging

  questdb:
    ports:
      - "9000:9000"   # Web UI
      - "9009:9009"   # ILP TCP (for local Rust dev)
      - "8812:8812"   # PostgreSQL wire protocol

  python-engine:
    build:
      context: ./services/engine
      dockerfile: Dockerfile
    volumes:
      - ./services/engine:/app    # Hot reload via volume mount
    environment:
      - ENGINE_LOG_LEVEL=DEBUG
    ports:
      - "8000:8000"   # FastAPI direct access

  dashboard:
    ports:
      - "3000:80"
      - "80:80"
