version: '3.8'

# =============================================================================
# Obscura Trading Engine — Production Docker Compose
# =============================================================================
# Memory Budget (16GB Host):
#   QuestDB:        2GB    | Python Engine:  2GB
#   Redis:          512MB  | Rust Ingestor:  256MB
#   Nginx (UI):     128MB  | Total Reserved: ~4.9GB
#   Remaining for OS + Future AI: ~11GB
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: obscura-redis
    command: redis-server --save 300 1 --loglevel warning --maxmemory 450mb --maxmemory-policy allkeys-lru
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - trading_net

  questdb:
    image: questdb/questdb:latest
    container_name: obscura-db
    restart: always
    logging: *default-logging
    ports:
      - "9000:9000"   # Web UI for manual SQL queries
    environment:
      - QDB_CAIRO_MAX_UNCOMMITTED_ROWS=50000
      - QDB_LINE_TCP_NET_ACTIVE_CONNECTION_LIMIT=4
    volumes:
      - ./data/questdb:/var/lib/questdb
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/exec?query=SELECT%201 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - trading_net

  # ---------------------------------------------------------------------------
  # MICROSERVICES
  # ---------------------------------------------------------------------------
  rust-ingestor:
    build:
      context: ./services/ingestor
      dockerfile: Dockerfile
    container_name: obscura-ingestor
    restart: always
    logging: *default-logging
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy
      questdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - trading_net

  python-engine:
    build:
      context: ./services/engine
      dockerfile: Dockerfile
    container_name: obscura-engine
    restart: always
    logging: *default-logging
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - trading_net

  # ---------------------------------------------------------------------------
  # FRONTEND
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: obscura-ui
    restart: always
    logging: *default-logging
    ports:
      - "80:80"    # Exposed to local network
    depends_on:
      - python-engine
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - trading_net

networks:
  trading_net:
    driver: bridge
